<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CricketLive — Watching Live</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#050508;--bg2:#0a0a12;--bg3:#0f0f1a;--card:#111120;--card2:#16162a;--neon:#00ffcc;--neon2:#00ccff;--neon3:#ff00aa;--neon4:#ffcc00;--red:#ff3366;--text:#e8e8ff;--muted:#6666aa;--border:rgba(0,255,204,0.15);--glow:0 0 20px rgba(0,255,204,0.3);--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,204,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,204,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:20px 16px;}
.header{text-align:center;padding:20px 0 24px;}
.logo{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--neon),var(--neon2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.live-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid var(--red);color:var(--red);font-size:0.75rem;font-weight:700;letter-spacing:2px;margin-top:8px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(0,255,204,0.4);}50%{box-shadow:0 0 20px rgba(0,255,204,0.8);}}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.scoreboard{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;position:relative;overflow:hidden;}
.scoreboard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--neon),var(--neon2),var(--neon3));}
.team-label{font-size:0.7rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.score-big{font-family:'Orbitron',monospace;font-size:3.5rem;font-weight:900;line-height:1;background:linear-gradient(135deg,#fff,var(--neon));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.score-overs{color:var(--muted);font-size:1rem;margin-top:6px;font-weight:600;}
.meta-row{display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;}
.meta-item{display:flex;flex-direction:column;gap:2px;}
.meta-label{font-size:0.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.meta-value{font-family:'Orbitron',monospace;font-size:0.9rem;font-weight:700;color:var(--neon2);}
.target-bar{margin-top:14px;padding:10px 14px;background:rgba(255,0,170,0.08);border:1px solid rgba(255,0,170,0.2);border-radius:8px;font-weight:600;color:var(--neon3);font-size:0.95rem;}

.player-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.player-row:last-child{border-bottom:none;}
.player-name{font-weight:600;font-size:1rem;}
.player-name.active{color:var(--neon);}
.player-score{font-family:'Orbitron',monospace;font-size:0.9rem;text-align:right;}
.player-sub{font-size:0.75rem;color:var(--muted);}

.over-dots{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.over-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:0.65rem;font-weight:700;border:2px solid;}
.od-dot{border-color:var(--muted);color:var(--muted);}
.od-run{border-color:var(--neon);color:var(--neon);}
.od-four{border-color:var(--neon4);color:var(--neon4);}
.od-six{border-color:var(--neon3);color:var(--neon3);}
.od-wicket{border-color:var(--red);color:var(--red);}
.od-extra{border-color:var(--neon2);color:var(--neon2);}

.fow-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.fow-badge{padding:4px 10px;border-radius:20px;border:1px solid rgba(255,51,102,0.3);background:rgba(255,51,102,0.08);font-size:0.8rem;font-family:'Orbitron',monospace;color:var(--red);}

.card-title{font-family:'Orbitron',monospace;font-size:0.7rem;font-weight:700;color:var(--neon);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--neon);border-radius:2px;}

.status-bar{text-align:center;padding:12px;background:var(--card2);border-radius:8px;margin-bottom:16px;font-size:0.85rem;color:var(--muted);}
.status-bar.connected{color:var(--neon);}
.aborted-screen{text-align:center;padding:60px 20px;}
.aborted-title{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;color:var(--red);margin:16px 0 8px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">CricketLive</div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span class="live-badge" id="liveBadge"><span class="live-dot"></span>LIVE</span>
      <a href="/" style="color:var(--muted);text-decoration:none;font-size:0.78rem;font-weight:600;">🏏 Scorer</a>
      <a href="/stats" style="color:var(--muted);text-decoration:none;font-size:0.78rem;font-weight:600;">📊 Stats</a>
    </div>
  </div>

  <div class="status-bar" id="statusBar">Connecting to live match...</div>

  <div id="mainContent" style="display:none;">
    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="team-label" id="watchTeamLabel">BATTING</div>
      <div class="score-big" id="watchScore">0/0</div>
      <div class="score-overs" id="watchOvers">0.0 overs</div>
      <div class="meta-row" id="watchMeta"></div>
      <div class="target-bar" id="watchTarget" style="display:none;"></div>
    </div>

    <!-- Current over -->
    <div class="card">
      <div class="card-title">This Over</div>
      <div class="over-dots" id="watchOverDots"></div>
    </div>

    <!-- At Crease -->
    <div class="card">
      <div class="card-title">At the Crease</div>
      <div id="watchBatters"></div>
    </div>

    <!-- Current Bowler -->
    <div class="card">
      <div class="card-title">Bowling</div>
      <div id="watchBowler"></div>
    </div>

    <!-- Fall of Wickets -->
    <div class="card">
      <div class="card-title">Fall of Wickets</div>
      <div class="fow-list" id="watchFow"><span style="color:var(--muted);font-size:0.85rem;">No wickets yet.</span></div>
    </div>
  </div>

  <!-- Aborted / Complete screens -->
  <div id="abortedScreen" style="display:none;" class="aborted-screen">
    <div style="font-size:3rem;">⛔</div>
    <div class="aborted-title">MATCH ABORTED</div>
    <p style="color:var(--muted);">This match has been called off.</p>
  </div>

  <div id="completeScreen" style="display:none;" class="aborted-screen">
    <div style="font-size:3rem;">🏆</div>
    <div class="aborted-title" style="color:var(--neon4);" id="completeTitle">MATCH COMPLETE</div>
    <p style="color:var(--muted);" id="completeResult">—</p>
  </div>
</div>

<script>
const MATCH_ID = parseInt("{{ match_id }}");
let ws = null;
let reconnectTimer = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/watch/${MATCH_ID}`);

  ws.onopen = () => {
    clearTimeout(reconnectTimer);
    document.getElementById('statusBar').textContent = '🟢 Connected — live updates active';
    document.getElementById('statusBar').className = 'status-bar connected';
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if(msg.type === 'score_update') updateDisplay(msg.state);
    else if(msg.type === 'match_aborted') showAborted();
    else if(msg.type === 'match_complete') showComplete(msg.result);
  };

  ws.onclose = () => {
    document.getElementById('statusBar').textContent = '🔴 Connection lost — reconnecting...';
    document.getElementById('statusBar').className = 'status-bar';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

function updateDisplay(s) {
  document.getElementById('mainContent').style.display = 'block';

  document.getElementById('watchTeamLabel').textContent = s.battingTeam + ' BATTING';
  document.getElementById('watchScore').textContent = `${s.runs}/${s.wickets}`;
  document.getElementById('watchOvers').textContent = `${s.overs} overs`;

  const rr = s.balls > 0 ? (s.runs / (s.balls / 6)).toFixed(2) : '0.00';
  let meta = `<div class="meta-item"><div class="meta-label">Run Rate</div><div class="meta-value">${rr}</div></div>`;
  meta += `<div class="meta-item"><div class="meta-label">Innings</div><div class="meta-value">${s.innings === 1 ? '1st' : '2nd'}</div></div>`;
  meta += `<div class="meta-item"><div class="meta-label">Extras</div><div class="meta-value">${s.extras}</div></div>`;

  if(s.target) {
    const needed = s.target - s.runs;
    const ballsLeft = (s.innings === 2 ? 0 : 0); // calculated server side
    meta += `<div class="meta-item"><div class="meta-label">Target</div><div class="meta-value">${s.target}</div></div>`;
    const tb = document.getElementById('watchTarget');
    tb.style.display = 'block';
    tb.textContent = `🎯 Need ${needed} more runs`;
  }
  document.getElementById('watchMeta').innerHTML = meta;

  // Over dots
  const dotMap = {four:'od-four',six:'od-six',wicket:'od-wicket',wd:'od-extra',nb:'od-extra',run:'od-run',dot:'od-dot'};
  document.getElementById('watchOverDots').innerHTML = (s.currentOver||[]).map(b =>
    `<div class="over-dot ${dotMap[b.type]||'od-dot'}">${b.label}</div>`
  ).join('');

  // Batters
  document.getElementById('watchBatters').innerHTML = `
    <div class="player-row">
      <div><div class="player-name active">⚡ ${s.striker.name} *</div><div class="player-sub">On strike</div></div>
      <div class="player-score"><div>${s.striker.runs} (${s.striker.balls})</div><div class="player-sub">SR: ${s.striker.balls>0?(s.striker.runs/s.striker.balls*100).toFixed(0):'—'}</div></div>
    </div>
    <div class="player-row">
      <div><div class="player-name">${s.nonStriker.name}</div><div class="player-sub">Non-striker</div></div>
      <div class="player-score"><div>${s.nonStriker.runs} (${s.nonStriker.balls})</div><div class="player-sub">SR: ${s.nonStriker.balls>0?(s.nonStriker.runs/s.nonStriker.balls*100).toFixed(0):'—'}</div></div>
    </div>
  `;

  // Bowler
  document.getElementById('watchBowler').innerHTML = `
    <div class="player-row">
      <div><div class="player-name active" style="color:var(--neon3);">🎳 ${s.bowler.name}</div></div>
      <div class="player-score"><div>${s.bowler.overs} ov — ${s.bowler.wickets}w — ${s.bowler.runs}r</div></div>
    </div>
  `;

  // Fall of wickets
  const fow = s.fow || [];
  document.getElementById('watchFow').innerHTML = fow.length
    ? fow.map(f => `<div class="fow-badge">${f.wicket}-${f.score} (${f.batter} @${f.over})</div>`).join('')
    : '<span style="color:var(--muted);font-size:0.85rem;">No wickets yet.</span>';
}

function showAborted() {
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('abortedScreen').style.display = 'block';
  document.getElementById('statusBar').textContent = 'Match aborted';
}

function showComplete(result) {
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('completeScreen').style.display = 'block';
  document.getElementById('completeResult').textContent = result;
  document.getElementById('statusBar').textContent = 'Match complete';
}

connect();
</script>
</body>
</html>
